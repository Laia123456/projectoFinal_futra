<body>
    <header>
        <section class="section1_headerIncio">
            <a href="../index.html"><h1>Futra</h1></a>
            
            <nav>
                <ul class="li_nav">
                    <a href="../index.html"><li>Inicio</li></a>

        <a href="../inicioSesion_pack/inicioSesion.html"><button class="button_incioSesion">Incia sesion</button></a>

    <main>

        <section class="container_filtrosEquipos"> <!--filtros-->
            <input class="input_filtrosEquipos" type="text" placeholder="Buscar equipo">
            <select class="select_filtroEquipos"> <!--clubes/selccion-->
                <option value="">Clubes/Seleccion</option>
                <option value="">Clubes</option>
                <option value="">Selcciona</option>
            </select>
            <select class="select_filtroEquipos"> <!--liga-->
                <option value="">Liga</option>
                <option value="">La Liga EASports</option>
                <option value="">Premier League</option>
                <option value="">Bundesliga</option>
                <option value="">Serie A</option>
                <option value="">Ligue 1</option>
            </select>
            <select class="select_filtroEquipos"> <!--pais-->
                <option value="">Pais</option>
                <option value="">España</option>
                <option value="">Francia</option>
                <option value="">Portugal</option>
                <option value="">Italia</option>
                <option value="">Inglaterra</option>
                <option value="">Paises Bajos</option>
                <option value="">Alemania</option>
            </select>
            <select class="select_filtroEquipos"> <!--competicion-->
                <option value="">Competición</option>
                <option value="">Champions League</option>
                <option value="">Europa League</option>
                <option value="">Conference League</option>
                <option value="">Eredivise</option>
                <option value="">La Liga EASports</option>
            </select>
            <select class="select_filtroEquipos"> <!--formacion-->
                <option value="">Formación</option>
                <option value="">4-3-3 (ofensiva)</option>
                <option value="">4-3-3 (defensiva)</option>
                <option value="">4-2-3-1</option>
                <option value="">5-3-2</option>
            </select>
            <select class="select_filtroEquipos"> <!--GRL-->
                <option value="">Valoración</option>
                <option value="">+95</option>
                <option value="">+90</option>
                <option value="">+85</option>
                <option value="">+80</option>
                <option value="">+75</option>
                <option value="">+70</option>
            </select>
        </section>

        <section class="container_escuadosEquipos">
            <section class="fila1_equipos"> <!--fila 1-->
                <div class="barca">
                    <img src="equipos_img/barça.png" alt="Barça">
                </div>
                <div class="realMadrid">
                    <img src="equipos_img/realMadrid.png" alt="Real Madrid">
                </div>
                <div class="atleticoMadrid">
                    <img src="equipos_img/atleti.png" alt="Atletico de Madrid">
                </div>
                <div class="villareal">
                    <img src="equipos_img/villarreal.png" alt="Villareal">
                </div>
            </section> 

            <section class="fila2_equipos"><!--fila 2-->
                <div class="betis">
                    <img src="equipos_img/betis.png" alt="Betis">
                </div>
                <div class="celta">
                    <img src="equipos_img/celta.png" alt="Celta">
                </div>
                <div class="realSociedad">
                    <img src="equipos_img/realSociedad.png" alt="Real Sociedad">
                </div>
                <div class="getafe">
                    <img src="equipos_img/getafe.png" alt="Getafe">
                </div>
            </section> 

            <section class="fila3_equipos"> <!--fila 3-->
                <div class="osasuna">
                    <img src="equipos_img/osasuna.png" alt=" Osasuna">
                </div>

                </div>
                <div class="girona">
                    <img src="equipos_img/girona.png" alt="Girona">
                </div>
                <div class="athletic">
                    <img src="equipos_img/athletic.png" alt="Athletic club de Bilbao">
                </div>
            </section> 

            <section class="fila4_equipos"> <!--fila 4-->
                <div class="rayoVallecano">
                    <img src="equipos_img/rayoVallecano.png" alt="Rayo Vallecano">
                </div>
                <div class="valencia">
                    <img src="equipos_img/valencia.png" alt="Valencia">
                </div>
                <div class="mallorca">
                    <img src="equipos_img/mallorca.png" alt="Mallorca">
                </div>
                <div class="sevilla">
                    <img src="equipos_img/sevilla.png" alt="Sevilla">
                </div>
            </section> 

            <section class="fila5_equipos"> <!--fila 5-->
                <div class="alaves">
                    <img src="equipos_img/alaves.png" alt="Alaves">
                </div>
                <div class="elche">

                <div class="oviedo">
